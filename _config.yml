# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Anya K. Bershad
first_name: Anya
middle_name: K.
last_name: Bershad
contact_note: >
  For clinical inquiries, please contact UCLA Health directly.
description: >
  Assistant Professor at UCLA studying social psychopharmacology —
  how psychoactive drugs shape our capacity for connection.
footer_text: >
  © 2026 Anya K. Bershad · UCLA Department of Psychiatry & Biobehavioral Sciences

icon: 🧠  # the emoji used as the favicon

url: https://yourusername.github.io  # ← replace with your GitHub username
baseurl: /anya-site                  # ← replace with your repo name
last_updated: false
impressum_path:

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: false

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------

rss_icon: true

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false
search_enabled: true
search:
  highlight: true

# Dimensions
max_width: 900px

# -----------------------------------------------------------------------------
# Open Graph & Schema
# -----------------------------------------------------------------------------

og_image: /assets/img/preview.png
serve_og_meta: true
serve_schema_org: true
schema_org_type: Person

# -----------------------------------------------------------------------------
# Social
# -----------------------------------------------------------------------------

email: anya.bershad@mednet.ucla.edu

# Comment out any you don't want shown
google_scholar: citations?user=1OysrpIAAAAJ
# twitter_username:
# github_username:
# linkedin_username:

contact_email: anya.bershad@mednet.ucla.edu

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: Notes
blog_nav_title: Blog
blog_description: Thoughts on social neuroscience, psychopharmacology, and medicine.
permalink: /blog/:year/:title/
lsi: false

# Pagination
pagination:
  enabled: true

related_blog_posts:
  enabled: true
  max_related: 5

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: false
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - INSTALL.md
  - LICENSE
  - README.md
  - readme_preview/
  - vendor

keep_files:
  - CNAME
  - .nojekyll
  - .git

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------

plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Jekyll Scholar (publications)
# -----------------------------------------------------------------------------

scholar:
  last_name: [Bershad]
  first_name: [Anya, A., Anya K.]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"

# Highlight Anya's name in author lists
highlight_author: true

# -----------------------------------------------------------------------------
# Sitemap
# -----------------------------------------------------------------------------

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

# -----------------------------------------------------------------------------
# Analytics
# -----------------------------------------------------------------------------

# google_analytics: G-XXXXXXXXXX  # uncomment and add your ID
